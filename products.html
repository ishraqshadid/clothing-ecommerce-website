<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Products — ŌURA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header with Mobile Nav Support -->
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a href="index.html" class="site-logo" aria-label="ŌURA — Home">ŌURA</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="products.html" class="active">Products</a>
        <a href="blog.html">Blog</a>
        <a href="about.html">About Us</a>
      </nav>
      <div class="header-actions">
        <button class="mobile-menu-toggle" aria-label="Toggle menu">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg>
        </button>
        <a href="wishlist.html" class="cart-btn" aria-label="Wishlist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </a>
        <a href="cart.html" class="cart-btn" aria-label="Shopping cart">
          <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span class="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-header" style="flex-direction:column; align-items:flex-start;">
          <h1 style="font-style:italic; margin-bottom: var(--space-md);">All Products</h1>
          
          <!-- Unified Controls: Search, Sort, Filter -->
          <div class="products-control-bar" style="width:100%;">
            <input type="search" id="product-search" class="search-input" placeholder="Search by name or category..." aria-label="Search products" />
            
            <select id="category-filter" class="filter-select" aria-label="Filter by category">
              <option value="all">All Categories</option>
            </select>
            
            <select id="product-sort" class="filter-select" aria-label="Sort products">
              <option value="default">Sort By: Featured</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
              <option value="newest">New Arrivals</option>
              <option value="popular">Best Selling</option>
            </select>
          </div>
        </div>
        
        <!-- Displays up to 28 products dynamically -->
        <div id="full-products-grid" class="product-grid" aria-live="polite"></div>
        
      </div>
    </section>
  </main>
  
  <script type="module" src="js/main.js"></script>
</body>
</html>
